<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      cursor: default;
      background: #030108;
    }

    /* ─── Animated gradient background ─── */
    .bg-aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(180, 30, 120, 0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 25% 60%, rgba(80, 20, 180, 0.3) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 75% 35%, rgba(255, 50, 100, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 90% 40% at 50% 80%, rgba(255, 180, 0, 0.15) 0%, transparent 50%);
      animation: auroraPulse 6s ease-in-out infinite alternate;
    }

    @keyframes auroraPulse {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.08); }
    }

    /* ─── Light rays behind text ─── */
    .light-rays {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 200vmax;
      height: 200vmax;
      transform: translate(-50%, -50%);
      z-index: 1;
      background: conic-gradient(
        from 0deg,
        transparent 0deg, rgba(255, 107, 157, 0.06) 8deg, transparent 16deg,
        transparent 24deg, rgba(255, 215, 0, 0.05) 32deg, transparent 40deg,
        transparent 48deg, rgba(155, 89, 182, 0.06) 56deg, transparent 64deg,
        transparent 72deg, rgba(255, 107, 157, 0.05) 80deg, transparent 88deg,
        transparent 96deg, rgba(255, 215, 0, 0.06) 104deg, transparent 112deg,
        transparent 120deg, rgba(155, 89, 182, 0.05) 128deg, transparent 136deg,
        transparent 144deg, rgba(255, 107, 157, 0.06) 152deg, transparent 160deg,
        transparent 168deg, rgba(255, 215, 0, 0.05) 176deg, transparent 184deg,
        transparent 192deg, rgba(155, 89, 182, 0.06) 200deg, transparent 208deg,
        transparent 216deg, rgba(255, 107, 157, 0.05) 224deg, transparent 232deg,
        transparent 240deg, rgba(255, 215, 0, 0.06) 248deg, transparent 256deg,
        transparent 264deg, rgba(155, 89, 182, 0.05) 272deg, transparent 280deg,
        transparent 288deg, rgba(255, 107, 157, 0.06) 296deg, transparent 304deg,
        transparent 312deg, rgba(255, 215, 0, 0.05) 320deg, transparent 328deg,
        transparent 336deg, rgba(155, 89, 182, 0.06) 344deg, transparent 360deg
      );
      animation: raysRotate 20s linear infinite;
      opacity: 0;
      pointer-events: none;
    }

    .light-rays.active {
      animation: raysRotate 20s linear infinite, raysIn 2s 0.6s ease forwards;
    }

    @keyframes raysRotate {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes raysIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── Canvas VFX ─── */
    .fx-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 8;
    }

    /* ─── Close button ─── */
    #close-btn {
      position: fixed;
      top: 22px;
      right: 30px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.35);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(12px);
    }
    #close-btn:hover {
      background: rgba(255,107,157,0.15);
      border-color: rgba(255,107,157,0.35);
      color: #FF6B9D;
      transform: scale(1.15) rotate(90deg);
    }

    /* ─── Main celebration content ─── */
    .celebration {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      opacity: 0;
    }

    .celebration.active {
      animation: celebrationIn 0.4s 0.1s ease forwards;
    }

    @keyframes celebrationIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── HAPPY BIRTHDAY text ─── */
    .happy-text {
      font-size: clamp(2.8rem, 6.5vw, 5.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      line-height: 1;
      color: transparent;
      background: linear-gradient(
        135deg,
        #FF6B9D 0%, #FF3F7A 15%, #FFD700 30%, #FFAA00 45%,
        #E056C1 55%, #9B59B6 70%, #FF6B9D 85%, #FFD700 100%
      );
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation:
        gradientFlow 3s ease infinite,
        textDropIn 0.7s 0.3s cubic-bezier(0.22, 1.5, 0.36, 1) both;
      filter: drop-shadow(0 0 60px rgba(255, 107, 157, 0.5))
              drop-shadow(0 0 120px rgba(255, 215, 0, 0.25));
      position: relative;
    }

    /* ─── NAME — the HUGE exciting part ─── */
    .name-container {
      margin-top: 8px;
      overflow: visible;
      position: relative;
    }

    .name-text {
      font-size: clamp(4rem, 12vw, 10rem);
      font-weight: 900;
      text-align: center;
      line-height: 1.05;
      letter-spacing: -0.02em;
      position: relative;
      display: inline-block;
    }

    .name-letter {
      display: inline-block;
      color: transparent;
      background: linear-gradient(
        180deg,
        #FFD700 0%, #FFAA00 30%, #FF6B9D 60%, #E056C1 100%
      );
      background-size: 100% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation:
        letterDrop 0.5s cubic-bezier(0.22, 1.6, 0.36, 1) both,
        letterColorShift 4s ease-in-out infinite alternate,
        letterBounce 2s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6))
              drop-shadow(0 4px 20px rgba(255, 80, 120, 0.4));
      text-shadow: none;
      position: relative;
    }

    .name-letter:nth-child(odd) {
      animation-delay: var(--d), 0s, calc(var(--i) * 0.15s);
    }
    .name-letter:nth-child(even) {
      animation-delay: var(--d), 2s, calc(var(--i) * 0.15s + 0.08s);
    }

    @keyframes letterDrop {
      0%   { opacity: 0; transform: translateY(-80px) scale(0.3) rotate(-15deg); }
      60%  { transform: translateY(8px) scale(1.12) rotate(3deg); }
      80%  { transform: translateY(-4px) scale(0.98) rotate(-1deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
    }

    @keyframes letterColorShift {
      0%   { background-position: 0% 0%; }
      100% { background-position: 0% 100%; }
    }

    @keyframes letterBounce {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }

    /* ─── Exclamation marks ─── */
    .exclaim-container {
      display: inline-block;
      position: relative;
    }

    .exclaim {
      display: inline-block;
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 900;
      color: #FFD700;
      filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.7));
      animation:
        exclaimPop 0.4s cubic-bezier(0.22, 1.8, 0.36, 1) both,
        exclaimShake 0.6s ease-in-out infinite alternate;
    }

    @keyframes exclaimPop {
      0%   { opacity: 0; transform: scale(0) rotate(-30deg); }
      70%  { transform: scale(1.3) rotate(8deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes exclaimShake {
      0%   { transform: rotate(-3deg) translateY(0); }
      100% { transform: rotate(3deg) translateY(-5px); }
    }

    /* ─── Sparkle elements ─── */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #FFD700;
      border-radius: 50%;
      pointer-events: none;
      animation: sparklePulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 8px 2px rgba(255, 215, 0, 0.6);
    }

    @keyframes sparklePulse {
      0%, 100% { opacity: 0; transform: scale(0); }
      50%      { opacity: 1; transform: scale(1.5); }
    }

    /* ─── Floating emojis ─── */
    .floating-emoji {
      position: fixed;
      font-size: 32px;
      pointer-events: none;
      z-index: 6;
      animation: emojiFloat linear forwards;
      opacity: 0;
    }

    @keyframes emojiFloat {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.5); }
      10%  { opacity: 1; transform: translateY(-10vh) rotate(15deg) scale(1); }
      90%  { opacity: 0.8; transform: translateY(-85vh) rotate(-20deg) scale(1.1); }
      100% { opacity: 0; transform: translateY(-100vh) rotate(30deg) scale(0.8); }
    }

    /* ─── Screen shake on entrance ─── */
    .screen-shake {
      animation: shakeIt 0.5s 0.2s ease-out;
    }

    @keyframes shakeIt {
      0%   { transform: translate(0, 0); }
      15%  { transform: translate(-4px, 2px); }
      30%  { transform: translate(4px, -3px); }
      45%  { transform: translate(-3px, 3px); }
      60%  { transform: translate(3px, -2px); }
      75%  { transform: translate(-2px, 1px); }
      100% { transform: translate(0, 0); }
    }

    /* ─── Closing transition ─── */
    .celebration.closing {
      animation: closeOut 0.6s ease-in forwards;
    }

    .bg-aurora.closing,
    .light-rays.closing,
    .fx-canvas.closing {
      animation: fadeOutQuick 0.5s ease-in forwards;
    }

    @keyframes closeOut {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.15); filter: blur(20px); }
    }

    @keyframes fadeOutQuick {
      to { opacity: 0; }
    }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ─── Subtitle ─── */
    .subtitle {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 20px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInUp 0.6s 2.2s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Glow ring pulse behind the name ─── */
    .glow-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60vw;
      height: 60vw;
      max-width: 700px;
      max-height: 700px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 107, 157, 0.12) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
      animation: glowPulse 3s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0%   { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-aurora" id="bg-aurora"></div>
  <div class="light-rays" id="light-rays"></div>
  <canvas id="fx" class="fx-canvas"></canvas>

  <button id="close-btn" title="Close">×</button>

  <div class="celebration" id="celebration">
    <div class="glow-ring"></div>
    <div class="happy-text" id="happy-text">HAPPY BIRTHDAY</div>
    <div class="name-container" id="name-container">
      <div class="name-text" id="name-text"></div>
    </div>
    <p class="subtitle" id="subtitle">from the strongest sorcerer ✦</p>
  </div>

  <script src="./birthday.js"></script>
</body>
</html>
