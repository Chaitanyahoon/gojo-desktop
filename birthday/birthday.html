<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      cursor: default;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(78, 22, 120, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(120, 20, 80, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(20, 40, 120, 0.3) 0%, transparent 60%),
        #0a0a1a;
    }

    /* ─── Canvas VFX layers ─── */
    .fx-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #fx-bg    { z-index: 0; }
    #fx-front { z-index: 10; }

    /* ─── Close button ─── */
    #close-btn {
      position: fixed;
      top: 20px;
      right: 28px;
      z-index: 100;
      width: 44px;
      height: 44px;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
    }
    #close-btn:hover {
      background: rgba(255,107,157,0.18);
      border-color: rgba(255,107,157,0.4);
      color: #FF6B9D;
      transform: scale(1.12);
    }

    /* ─── Main celebration ─── */
    .celebration {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 36px 20px;
      opacity: 0;
      animation: fadeIn 1.2s 0.3s ease forwards;
    }

    /* ─── Title section ─── */
    .title-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .title {
      font-family: 'Dancing Script', 'Georgia', cursive;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, #FF6B9D, #FFD700, #E056C1, #9B59B6, #FF6B9D);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s ease infinite, titleIn 0.9s 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      filter: drop-shadow(0 0 40px rgba(255, 107, 157, 0.35));
      line-height: 1.2;
    }

    .name {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.6rem, 4vw, 3.2rem);
      font-weight: 800;
      color: #FFD700;
      text-shadow: 0 0 28px rgba(255, 215, 0, 0.45);
      margin-top: 10px;
      opacity: 0;
      animation: fadeInUp 0.7s 1.3s ease forwards;
      letter-spacing: 0.06em;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.35);
      font-weight: 500;
      margin-top: 6px;
      opacity: 0;
      animation: fadeIn 0.6s 1.8s ease forwards;
    }

    /* ─── Cards grid ─── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 720px;
      width: 100%;
      padding: 0 16px;
    }

    @media (max-width: 700px) {
      .cards-grid {
        grid-template-columns: repeat(2, 1fr);
        max-width: 380px;
      }
    }

    /* ─── 3D Flip Card ─── */
    .card {
      perspective: 900px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(50px);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card.revealed:hover {
      transform: none;
      cursor: default;
    }

    .card-inner {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px;
      overflow: hidden;
    }

    /* Envelope front */
    .card-front {
      background: var(--card-bg, rgba(255,255,255,0.05));
      border: 1.5px solid var(--card-border, rgba(255,255,255,0.08));
      backdrop-filter: blur(14px);
      gap: 10px;
    }

    .card-front::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 42%;
      background: var(--card-flap, rgba(255,255,255,0.03));
      clip-path: polygon(0 0, 50% 65%, 100% 0);
      pointer-events: none;
    }

    .card-front .card-emoji {
      font-size: 32px;
      animation: float 3s var(--delay, 0s) ease-in-out infinite;
      z-index: 2;
    }

    .card-front .card-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      z-index: 2;
    }

    .card-front .card-seal {
      position: absolute;
      bottom: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--card-accent, #FF6B9D);
      opacity: 0.6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* Letter back */
    .card-back {
      background: linear-gradient(160deg, var(--card-back-start, #1a1a3e), var(--card-back-end, #2d1b4e));
      transform: rotateY(180deg);
      border: 1.5px solid var(--card-accent, rgba(255,107,157,0.25));
      padding: 18px 14px;
      text-align: center;
      justify-content: space-between;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.15);
    }

    .card-back .card-quote-mark {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: var(--card-accent, #FF6B9D);
      opacity: 0.5;
      line-height: 1;
    }

    .card-back .card-msg {
      font-size: 12px;
      line-height: 1.55;
      color: rgba(255,255,255,0.88);
      font-weight: 500;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .card-back .card-sig {
      font-family: 'Dancing Script', cursive;
      font-size: 15px;
      color: var(--card-accent, #FF6B9D);
    }

    /* ─── Progress ─── */
    .progress {
      margin-top: 28px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeIn 0.5s 3s ease forwards;
    }

    .progress span {
      color: #FFD700;
    }

    /* ─── Finale overlay ─── */
    .finale {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, 0.94);
      backdrop-filter: blur(24px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .finale.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .finale-emoji {
      font-size: 48px;
      margin-bottom: 24px;
      animation: float 2s ease-in-out infinite;
    }

    .finale-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      background: linear-gradient(135deg, #FFD700, #FF6B9D);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      text-align: center;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    .finale-text {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      text-align: center;
      color: rgba(255,255,255,0.7);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .finale-close {
      padding: 14px 40px;
      border: 2px solid rgba(255, 215, 0, 0.25);
      border-radius: 40px;
      background: rgba(255, 215, 0, 0.06);
      color: #FFD700;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.04em;
    }

    .finale-close:hover {
      background: rgba(255, 215, 0, 0.14);
      border-color: rgba(255, 215, 0, 0.45);
      transform: scale(1.06);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
    }

    /* ─── Keyframes ─── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes titleIn {
      from { opacity: 0; transform: scale(0.2) rotate(-5deg); }
      60%  { transform: scale(1.06) rotate(1deg); }
      to   { opacity: 1; transform: scale(1) rotate(0); }
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.2)); }
      50%      { filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.5)); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(50px) scale(0.88); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes cardShake {
      0%, 100% { transform: rotate(0); }
      25%      { transform: rotate(-2deg); }
      75%      { transform: rotate(2deg); }
    }
  </style>
</head>
<body>
  <canvas id="fx-bg" class="fx-canvas"></canvas>
  <canvas id="fx-front" class="fx-canvas"></canvas>

  <button id="close-btn" title="Close celebration">×</button>

  <div class="celebration" id="celebration">
    <div class="title-section">
      <h1 class="title" id="title">Happy Birthday</h1>
      <h2 class="name" id="name"></h2>
      <p class="subtitle" id="subtitle">Click the letters below to open your wishes ✨</p>
    </div>

    <div class="cards-grid" id="cards"></div>

    <p class="progress" id="progress">Wishes opened: <span id="progress-count">0</span> / <span id="progress-total">8</span></p>
  </div>

  <div class="finale" id="finale">
    <div class="finale-emoji">🎂</div>
    <h2 class="finale-title" id="finale-title">You're truly special.</h2>
    <p class="finale-text" id="finale-text">From the strongest sorcerer, with love. May every moment of this year bring you joy.</p>
    <button class="finale-close" id="finale-close">Close Celebration ✦</button>
  </div>

  <script src="./birthday.js"></script>
</body>
</html>
