<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gojo Bubble</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Comic Sans MS", "Chalkboard SE", "Comic Neue", cursive, sans-serif;
      }

      #bubble {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        opacity: 0;
        transform: scale(0.3);
        transform-origin: bottom center;
        transition:
          opacity 150ms ease,
          transform 350ms cubic-bezier(0.34, 1.7, 0.64, 1);
        padding: 4px 6px 8px 6px;
      }

      #bubble.visible {
        opacity: 1;
        transform: scale(1);
      }

      #content {
        position: relative;
        min-width: 52px;
        max-width: 240px;
        padding: 10px 16px;
        background: #fff;
        color: #1a1a2e;
        border: 2.5px solid #222;
        border-radius: 18px 18px 18px 4px;
        box-shadow:
          3px 3px 0px #222,
          0 4px 12px rgba(0, 0, 0, 0.15);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.2px;
        line-height: 1.35;
        text-align: center;
        z-index: 2;
      }



      /* Pop entrance for each element */
      @keyframes popIn {
        0% { transform: scale(0); opacity: 0; }
        60% { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }

      #bubble.visible #content {
        animation: popIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      #bubble.visible .trail-dot.d1 {
        display: none;
      }

      #bubble.visible .trail-dot.d2 {
        display: none;
      }

      /* Gentle idle wobble */
      @keyframes wobble {
        0% { transform: rotate(-1deg) translateY(0px); }
        50% { transform: rotate(0.5deg) translateY(-2px); }
        100% { transform: rotate(-1deg) translateY(0px); }
      }

      #bubble.visible #content {
        animation: popIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                   wobble 2.5s 400ms ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="bubble">
      <div id="content"></div>
    </div>

    <script src="./bubble.js"></script>
  </body>
</html>
