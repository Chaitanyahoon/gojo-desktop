<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gojo Chat</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      
      .chat-container {
        display: flex;
        align-items: center;
        width: calc(100% - 16px);
        height: calc(100% - 16px);
        margin: 8px;
        background: rgba(14, 15, 22, 0.9);
        border: 1px solid rgba(94, 168, 255, 0.4);
        border-radius: 20px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        backdrop-filter: blur(8px);
      }

      input {
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: white;
        padding: 0 16px;
        font-family: inherit;
        font-size: 14px;
      }
      
      input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <input type="text" id="chatInput" placeholder="Say something to Satoru..." autocomplete="off" autofocus />
    </div>

    <script src="./chat.js"></script>
  </body>
</html>
