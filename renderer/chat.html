<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Gojo</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
      }

      .wrap {
        position: absolute;
        inset: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(10, 12, 22, 0.96);
        border: 1px solid rgba(94, 168, 255, 0.55);
        border-radius: 22px;
        padding: 0 10px 0 8px;
        box-shadow:
          0 0 0 1px rgba(94, 168, 255, 0.08),
          0 0 20px rgba(78, 168, 255, 0.22),
          0 8px 24px rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(20px);
        animation: slideUp 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Animated glow pulse on the border */
      .wrap::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 22px;
        background: linear-gradient(135deg, rgba(78, 168, 255, 0.4), rgba(141, 86, 255, 0.4));
        z-index: -1;
        opacity: 0;
        animation: glow-pulse 2.5s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%, 100% { opacity: 0; }
        50%       { opacity: 0.6; }
      }

      .avatar {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: linear-gradient(135deg, #4ea8ff, #8d56ff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.5px;
        box-shadow: 0 0 8px rgba(78, 168, 255, 0.5);
      }

      .divider {
        width: 1px;
        height: 18px;
        background: rgba(94, 168, 255, 0.25);
        flex-shrink: 0;
      }

      input {
        flex: 1;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: #eef2ff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 400;
        caret-color: #4ea8ff;
      }

      input::placeholder {
        color: rgba(154, 168, 200, 0.5);
        font-style: italic;
      }

      .send-btn {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, #4ea8ff, #8d56ff);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 2px 8px rgba(78, 168, 255, 0.35);
      }

      .send-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 12px rgba(78, 168, 255, 0.5);
      }

      .send-btn svg { pointer-events: none; }

      /* Focus glow on the container */
      .wrap:focus-within {
        border-color: rgba(94, 168, 255, 0.9);
        box-shadow:
          0 0 0 1px rgba(94, 168, 255, 0.12),
          0 0 28px rgba(78, 168, 255, 0.35),
          0 8px 24px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="avatar">GS</div>
      <div class="divider"></div>
      <input type="text" id="chatInput" placeholder="Ask Satoru anything..." autocomplete="off" autofocus />
      <button class="send-btn" id="sendBtn" title="Send">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 6h10M6 1l5 5-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <script src="./chat.js"></script>
  </body>
</html>
