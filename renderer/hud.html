<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gojo HUD</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #hud {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: rgba(18, 18, 32, 0.85);
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        backdrop-filter: blur(14px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        opacity: 0;
        transform: translateY(4px) scale(0.92);
        transition:
          opacity 150ms ease,
          transform 250ms cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
      }

      #hud.visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .stat-pill {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px 2px 4px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 12px;
      }

      .stat-icon {
        font-size: 10px;
        line-height: 1;
      }

      .stat-ring {
        position: relative;
        width: 22px;
        height: 22px;
      }

      .stat-ring svg {
        width: 22px;
        height: 22px;
        transform: rotate(-90deg);
      }

      .stat-ring .track {
        fill: none;
        stroke: rgba(255, 255, 255, 0.08);
        stroke-width: 3;
      }

      .stat-ring .fill {
        fill: none;
        stroke-width: 3;
        stroke-linecap: round;
        transition: stroke-dashoffset 600ms cubic-bezier(0.25, 1, 0.5, 1);
      }

      .fill.mood   { stroke: #e056c1; }
      .fill.energy { stroke: #48d1f5; }
      .fill.hunger { stroke: #f1c40f; }

      .stat-val {
        font-size: 9px;
        font-weight: 700;
        color: rgba(200, 210, 230, 0.8);
        min-width: 14px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <!-- Mood -->
      <div class="stat-pill">
        <span class="stat-icon">♡</span>
        <div class="stat-ring">
          <svg viewBox="0 0 22 22">
            <circle class="track" cx="11" cy="11" r="8" />
            <circle class="fill mood" id="ring-mood" cx="11" cy="11" r="8"
              stroke-dasharray="50.27" stroke-dashoffset="50.27" />
          </svg>
        </div>
        <span class="stat-val" id="val-mood">—</span>
      </div>
      <!-- Energy -->
      <div class="stat-pill">
        <span class="stat-icon">⚡</span>
        <div class="stat-ring">
          <svg viewBox="0 0 22 22">
            <circle class="track" cx="11" cy="11" r="8" />
            <circle class="fill energy" id="ring-energy" cx="11" cy="11" r="8"
              stroke-dasharray="50.27" stroke-dashoffset="50.27" />
          </svg>
        </div>
        <span class="stat-val" id="val-energy">—</span>
      </div>
      <!-- Hunger -->
      <div class="stat-pill">
        <span class="stat-icon">🍡</span>
        <div class="stat-ring">
          <svg viewBox="0 0 22 22">
            <circle class="track" cx="11" cy="11" r="8" />
            <circle class="fill hunger" id="ring-hunger" cx="11" cy="11" r="8"
              stroke-dasharray="50.27" stroke-dashoffset="50.27" />
          </svg>
        </div>
        <span class="stat-val" id="val-hunger">—</span>
      </div>
    </div>
    <script src="./hud.js"></script>
  </body>
</html>
